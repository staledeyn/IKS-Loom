<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IKS-Loom — Indian Knowledge Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --border: #2a2a3a;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --teal: #4ecdc4;
  --rose: #e8627a;
  --sage: #7bc47f;
  --amber: #f0a050;
  --text: #e8e4d8;
  --text2: #8a8478;
  --text3: #5a5650;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(201,168,76,0.06) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

header {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  padding: 0 32px;
  height: 60px;
  border-bottom: 1px solid var(--border);
  background: rgba(10,10,15,0.9);
  backdrop-filter: blur(12px);
  gap: 24px;
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.logo-mark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.5px;
}

.logo-sub {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.search-wrap {
  flex: 1;
  max-width: 560px;
  margin: 0 auto;
  position: relative;
}

.search-wrap input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 9px 44px 9px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-wrap input::placeholder { color: var(--text3); }
.search-wrap input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
}

.search-wrap button {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 15px;
  transition: color 0.2s;
  padding: 4px;
}
.search-wrap button:hover { color: var(--gold); }

.stats-row {
  display: flex;
  gap: 20px;
  margin-left: auto;
}

.stat {
  text-align: right;
}
.stat-val {
  font-size: 16px;
  font-weight: 500;
  color: var(--gold);
  font-family: 'Cormorant Garamond', serif;
}
.stat-label {
  font-size: 9px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

.graph-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  z-index: 1;
}

#graph-svg { width: 100%; height: 100%; }

.empty-state {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
}

.empty-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 40px;
  font-style: italic;
  color: var(--gold);
  opacity: 0.15;
  margin-bottom: 8px;
}

.empty-sub {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.legend {
  position: absolute;
  bottom: 24px;
  left: 24px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  background: rgba(10,10,15,0.8);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 16px;
  backdrop-filter: blur(8px);
}

.legend-title {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text3);
  margin-bottom: 4px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text2);
}

.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.controls {
  position: absolute;
  bottom: 24px;
  right: 24px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.ctrl-btn {
  width: 32px;
  height: 32px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text2);
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.ctrl-btn:hover { border-color: var(--gold); color: var(--gold); }

.tooltip {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 2px solid var(--gold);
  border-radius: 4px;
  padding: 10px 14px;
  font-size: 12px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 100;
  max-width: 220px;
}

.tt-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 3px;
}

.tt-group {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text3);
}

.result-count {
  position: absolute;
  top: 16px;
  left: 16px;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1px;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-mark">IKS-Loom</span>
    <span class="logo-sub">Indian Knowledge Systems</span>
  </div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search manuscripts… e.g. rasa, mercury, ayurveda, yoga" onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()" title="Search">⌕</button>
  </div>
  <div class="stats-row">
    <div class="stat">
      <div class="stat-val" id="stat-nodes">—</div>
      <div class="stat-label">Nodes</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-docs">—</div>
      <div class="stat-label">Manuscripts</div>
    </div>
  </div>
</header>

<div class="graph-area">
  <svg id="graph-svg"></svg>

  <div class="empty-state" id="emptyState">
    <div class="empty-title">Search the Corpus</div>
    <div class="empty-sub">Enter a concept, material, or discipline</div>
  </div>

  <div class="result-count" id="resultCount"></div>

  <div class="legend">
    <div class="legend-title">Node Types</div>
    <div class="legend-item"><div class="legend-dot" style="background:#4ecdc4"></div>Concept</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e8627a"></div>Material</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7bc47f"></div>Process</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f0a050"></div>Discipline</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c9a84c"></div>Product</div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="zoomIn()" title="Zoom in">+</button>
    <button class="ctrl-btn" onclick="zoomOut()" title="Zoom out">−</button>
    <button class="ctrl-btn" onclick="resetZoom()" title="Reset">⊙</button>
  </div>

  <div class="tooltip" id="tooltip"></div>
</div>

<script>
const API = '';
const groupColor = {
  concept: '#4ecdc4', material: '#e8627a', process: '#7bc47f',
  discipline: '#f0a050', product: '#c9a84c'
};
const getColor = g => groupColor[(g||'').toLowerCase()] || '#8a8478';

let svgZoom = null;
let simulation = null;

async function updateStats() {
  try {
    const r = await fetch(`${API}/api/stats`);
    const d = await r.json();
    document.getElementById('stat-nodes').textContent = d.nodes.toLocaleString();
    document.getElementById('stat-docs').textContent = d.documents.toLocaleString();
  } catch(e) {}
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  try {
    const r = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    setTimeout(() => drawGraph(d, q), 100);
  } catch(e) { console.error(e); }
}

function drawGraph(data, query='') {
  const nodes = (data.nodes || []).map(n => ({...n}));
  const links = (data.links || []).map(l => ({...l}));

  document.getElementById('emptyState').style.display = nodes.length ? 'none' : 'block';
  document.getElementById('resultCount').textContent = nodes.length
    ? `${nodes.length} nodes · ${links.length} links`
    : query ? 'No results found' : '';

  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();
  if (!nodes.length) return;

  const container = document.querySelector('.graph-area');
  const W = container.clientWidth || window.innerWidth;
  const H = container.clientHeight || window.innerHeight - 60;

  const nodes = (data.nodes || []).map(n => ({...n, x: W/2 + (Math.random()-0.5)*200, y: H/2 + (Math.random()-0.5)*200}));
  const links = (data.links || []).map(l => ({...l}));

  const defs = svg.append('defs');

  defs.append('marker')
    .attr('id', 'arrow')
    .attr('viewBox', '0 -4 8 8')
    .attr('refX', 26)
    .attr('refY', 0)
    .attr('markerWidth', 5)
    .attr('markerHeight', 5)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L8,0L0,4')
    .attr('fill', '#2a2a3a');

  nodes.forEach(n => {
    const grad = defs.append('radialGradient').attr('id', `g-${n.id.replace(/\W/g,'_')}`);
    const c = getColor(n.group);
    grad.append('stop').attr('offset', '0%').attr('stop-color', c).attr('stop-opacity', 0.3);
    grad.append('stop').attr('offset', '100%').attr('stop-color', c).attr('stop-opacity', 0.05);
  });

  const g = svg.append('g');

  const zoom = d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => g.attr('transform', e.transform));
  svgZoom = zoom;
  svg.call(zoom);

  if (simulation) simulation.stop();
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(140).strength(0.5))
    .force('charge', d3.forceManyBody().strength(-500))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide(36))
    .alpha(1)
    .restart();

  const linkG = g.append('g');
  const link = linkG.selectAll('line').data(links).join('line')
    .attr('stroke', '#1e2030')
    .attr('stroke-width', 1)
    .attr('marker-end', 'url(#arrow)');

  const linkLabel = linkG.selectAll('text').data(links).join('text')
    .attr('text-anchor', 'middle')
    .attr('font-size', 8)
    .attr('font-family', 'DM Mono, monospace')
    .attr('fill', '#3a3a4a')
    .text(d => (d.relationship || '').toLowerCase());

  const nodeG = g.append('g').selectAll('g').data(nodes).join('g')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  nodeG.append('circle')
    .attr('r', 22)
    .attr('fill', d => `url(#g-${d.id.replace(/\W/g,'_')})`)
    .attr('stroke', d => getColor(d.group))
    .attr('stroke-width', 1.5)
    .attr('stroke-opacity', 0.6);

  nodeG.append('circle').attr('r', 4).attr('fill', d => getColor(d.group)).attr('opacity', 0.9);

  nodeG.append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', 34)
    .attr('font-size', 10)
    .attr('font-family', 'Cormorant Garamond, serif')
    .attr('fill', d => getColor(d.group))
    .attr('opacity', 0.85)
    .text(d => (d.label || d.id || '').substring(0, 18));

  const tooltip = document.getElementById('tooltip');
  nodeG
    .on('mouseover', (e, d) => {
      tooltip.innerHTML = `<div class="tt-name">${d.label || d.id}</div><div class="tt-group">${d.group || 'entity'}</div>`;
      tooltip.style.opacity = 1;
      d3.select(e.currentTarget).select('circle').attr('stroke-width', 2.5).attr('stroke-opacity', 1);
    })
    .on('mousemove', e => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 36) + 'px';
    })
    .on('mouseout', (e) => {
      tooltip.style.opacity = 0;
      d3.select(e.currentTarget).select('circle').attr('stroke-width', 1.5).attr('stroke-opacity', 0.6);
    });

  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    linkLabel
      .attr('x', d => (d.source.x + d.target.x) / 2)
      .attr('y', d => (d.source.y + d.target.y) / 2);
    nodeG.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

function zoomIn() { d3.select('#graph-svg').transition().call(svgZoom?.scaleBy, 1.4); }
function zoomOut() { d3.select('#graph-svg').transition().call(svgZoom?.scaleBy, 0.7); }
function resetZoom() { d3.select('#graph-svg').transition().call(svgZoom?.transform, d3.zoomIdentity); }

updateStats();
</script>
</body>
</html>
